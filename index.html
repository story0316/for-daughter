<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>벚꽃길 숨은그림찾기</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- 시작 화면 -->
    <section id="screen-start" class="screen active">
      <div class="start-card">
        <div class="start-emoji">🌸</div>
        <h1>벚꽃길<br/>숨은그림찾기</h1>
        <p class="subtitle">화면을 톡톡 터치해서<br/>숨어있는 그림을 모두 찾아보세요!</p>

        <div class="mode-picker">
          <p class="mode-label">게임 모드를 선택하세요</p>
          <div class="mode-buttons" id="mode-buttons">
            <button class="mode-btn" data-mode="chameleon">🦎<br/>카멜레온<br/>숨은그림찾기</button>
            <button class="mode-btn" data-mode="diff">🔍<br/>틀린그림<br/>찾기</button>
          </div>
          <p class="mode-desc" id="mode-desc">대상이 배경 색과 모양에 맞춰 매번 다르게 나타나요 🦎</p>
        </div>

        <div class="difficulty-picker">
          <p class="difficulty-label">난이도를 선택하세요</p>
          <div class="difficulty-buttons" id="difficulty-buttons">
            <button class="diff-btn" data-diff="1">1</button>
            <button class="diff-btn" data-diff="2">2</button>
            <button class="diff-btn" data-diff="3">3</button>
            <button class="diff-btn" data-diff="4">4</button>
            <button class="diff-btn" data-diff="5">5</button>
          </div>
          <p class="difficulty-desc" id="difficulty-desc">아주 쉬움 · 크고 또렷하게 보여요</p>
        </div>

        <button id="btn-start" class="btn btn-primary">시작하기</button>
        <p class="hint-text">총 5개의 벚꽃길 스테이지가 기다리고 있어요 🌷</p>
      </div>
      <div class="petals-deco" aria-hidden="true"></div>
    </section>

    <!-- 게임 화면 -->
    <section id="screen-game" class="screen">
      <header class="hud">
        <div class="hud-row">
          <div class="progress-dots" id="progress-dots"></div>
          <button id="btn-hint" class="btn btn-hint">💡 힌트 <span id="hint-count">5</span></button>
        </div>
        <div class="hud-row">
          <h2 id="level-title"><span id="diff-badge" class="diff-badge">Lv.1</span><span id="level-title-text">1판. 벚꽃길 입구</span></h2>
          <div id="found-counter" class="found-counter">0 / 3</div>
        </div>
      </header>

      <div id="stage-wrap">
        <svg id="scene" viewBox="0 0 540 960" preserveAspectRatio="xMidYMid meet"></svg>
        <div id="diff-stage" style="display:none">
          <svg id="sceneA" class="diff-svg" viewBox="0 140 540 520" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="diff-divider"></div>
          <svg id="sceneB" class="diff-svg" viewBox="0 140 540 520" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
        <div id="petal-layer"></div>
        <div id="toast" class="toast"></div>
      </div>
    </section>

    <!-- 레벨 클리어 -->
    <section id="screen-levelclear" class="screen overlay-screen">
      <div class="clear-card">
        <div class="clear-emoji">🎉</div>
        <h2 id="levelclear-title">1판 클리어!</h2>
        <p id="levelclear-time">걸린 시간: 12초</p>
        <button id="btn-next" class="btn btn-primary">다음 판으로</button>
      </div>
    </section>

    <!-- 게임 완료 -->
    <section id="screen-complete" class="screen overlay-screen">
      <div class="clear-card">
        <div class="clear-emoji">🌸🏆🌸</div>
        <h2>벚꽃길 완주!</h2>
        <p>5개의 판을 모두 클리어했어요!</p>
        <p id="complete-time" class="complete-time">총 걸린 시간: 00:00</p>
        <button id="btn-restart" class="btn btn-primary">다시 처음부터</button>
      </div>
    </section>

  </div>
  <script src="script.js"></script>
</body>
</html>
